<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Infrastructure Monitoring System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
margin:0;
}

h1{
text-align:center;
padding:20px;
}

.dashboard{
padding:40px;
}

.card-container{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
background:#1e293b;
padding:20px;
border-radius:12px;
position:relative;
transition:0.3s;
}

.green{border-left:6px solid #22c55e;}
.yellow{border-left:6px solid #facc15;}
.red{border-left:6px solid #ef4444;}

canvas{
margin-top:10px;
}

.gauge-center{
position:absolute;
top:65%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
font-weight:bold;
}

.input-panel{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:30px;
}

input{
padding:8px;
margin-right:10px;
width:80px;
}

button{
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<h1>AI Infrastructure Monitoring System</h1>

<div class="dashboard">

<div class="input-panel">

<h3>Manual Sensor Input</h3>

<label>Vibration:</label>
<input type="number" id="vibrationInput" value="10">

<label>Temperature:</label>
<input type="number" id="temperatureInput" value="40">

<label>Load:</label>
<input type="number" id="loadInput" value="30">

<button onclick="updateDashboard()">Update Dashboard</button>

</div>

<div class="card-container">

<div class="card">

<h3>Infrastructure Health</h3>

<canvas id="healthGauge"></canvas>

<div id="healthValue" class="gauge-center">--%</div>

</div>

<div id="riskCard" class="card green">

<h3>Risk Status</h3>

<div id="riskBadge" style="
font-size:22px;
font-weight:bold;
margin-top:10px;
padding:10px 15px;
border-radius:8px;
display:inline-block;
background:#22c55e;
color:black;">
Low Risk
</div>

<p style="margin-top:15px; opacity:0.7;">
AI evaluated structural safety based on vibration,
temperature and load.
</p>

</div>

<div class="card">

<h3>Sensor Data</h3>

<canvas id="sensorChart"></canvas>

</div>

</div>

<div class="card">

<h3>Failure Prediction</h3>

<canvas id="predictionChart"></canvas>

</div>

</div>

<script>

let sensorChart;
let gaugeChart;
let predictionChart;

function createCharts(){

sensorChart=new Chart(
document.getElementById("sensorChart"),
{
type:"bar",
data:{
labels:["Vibration","Temperature","Load"],
datasets:[{
label:"Sensor Values",
data:[0,0,0],
backgroundColor:["orange","cyan","lime"]
}]
}
});

gaugeChart=new Chart(
document.getElementById("healthGauge"),
{
type:"doughnut",
data:{
datasets:[{
data:[50,50],
backgroundColor:["#22c55e","#ef4444"],
borderWidth:0
}]
},
options:{
circumference:180,
rotation:270,
cutout:"75%",
plugins:{legend:{display:false}}
}
});

predictionChart=new Chart(
document.getElementById("predictionChart"),
{
type:"line",
data:{
labels:["1h","2h","3h","4h","5h","6h"],
datasets:[{
label:"Failure Probability %",
data:[10,15,20,30,35,40],
borderWidth:3,
tension:0.4
}]
}
});

}

function updateDashboard(){

const vibration = parseFloat(document.getElementById("vibrationInput").value);
const temperature = parseFloat(document.getElementById("temperatureInput").value);
const load = parseFloat(document.getElementById("loadInput").value);

sensorChart.data.datasets[0].data=[vibration,temperature,load];
sensorChart.update();

let health = 100 - (temperature*0.3 + vibration*0.8 + load*0.2);
health = Math.max(0,Math.min(100,health));

gaugeChart.data.datasets[0].data=[health,100-health];
gaugeChart.update();

document.getElementById("healthValue").innerText=Math.round(health)+"%";

let risk="LOW";

if(health<70) risk="MEDIUM";
if(health<40) risk="HIGH";

const riskCard=document.getElementById("riskCard");
const badge=document.getElementById("riskBadge");

riskCard.className="card";

if(risk==="LOW"){
riskCard.classList.add("green");
badge.innerText="Low Risk";
badge.style.background="#22c55e";
}

if(risk==="MEDIUM"){
riskCard.classList.add("yellow");
badge.innerText="Medium Risk";
badge.style.background="#facc15";
}

if(risk==="HIGH"){
riskCard.classList.add("red");
badge.innerText="High Risk";
badge.style.background="#ef4444";
}

}

createCharts();

</script>

</body>
</html>
